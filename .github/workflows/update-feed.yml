name: Update X Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python vorbereiten
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: RSS-Feeds und Bilder erstellen
        run: |
          python bot.py
          python bot_confusion.py

      - name: RSS-Dateien und Bilder speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.xml images/

          if git diff --cached --quiet; then
            echo "Keine Änderungen an RSS-Dateien oder Bildern."
          else
            git commit -m "Update RSS feed and images"
            git push
          fi

      - name: Auf GitHub Pages warten
        run: |
          echo "Warte 60 Sekunden auf die Veröffentlichung der Bilder ..."
          sleep 60

      - name: Discord-Posts senden
        env:
          DISCORD_WEBHOOK_MOSCHT: ${{ secrets.DISCORD_WEBHOOK_MOSCHT }}
          DISCORD_WEBHOOK_CONFUSION: ${{ secrets.DISCORD_WEBHOOK_CONFUSION }}
        run: |
          python discord_poster.py

      - name: Discord-Status speichern
        run: |
          git add last_posts.json

          if git diff --cached --quiet; then
            echo "Keine Änderungen an last_posts.json."
          else
            git commit -m "Update Discord state"
            git push
          fi
