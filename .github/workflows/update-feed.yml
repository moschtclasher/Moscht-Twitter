name: Update X Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python vorbereiten
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate RSS feeds
        env:
          DISCORD_WEBHOOK_MOSCHT: ${{ secrets.DISCORD_WEBHOOK_MOSCHT }}
          DISCORD_WEBHOOK_CONFUSION: ${{ secrets.DISCORD_WEBHOOK_CONFUSION }}
        run: |
          python bot.py
          python bot_confusion.py
          python discord_poster.py

      - name: RSS-Dateien, Bilder und Status speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.xml images/ last_posts.json
          git diff --cached --quiet || git commit -m "Update RSS feed, images and Discord state"
          git push
